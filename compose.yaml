services:
  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,equansdatahub-tree-panel,volkovlabs-form-panel,volkovlabs-table-panel,yesoreyeram-infinity-datasource,marcusolsson-dynamictext-panel
      - PNS_DB_HOST=${PNS_DB_HOST}
      - PNS_DB_PORT=${PNS_DB_PORT}
      - PNS_DB_NAME=${PNS_DB_NAME}
      - PNS_DB_USER=${PNS_DB_USER}
      - PNS_DB_PASSWORD=${PNS_DB_PASSWORD}
      - RCC_DB_HOST=${RCC_DB_HOST}
      - RCC_DB_PORT=${RCC_DB_PORT}
      - RCC_DB_NAME=${RCC_DB_NAME}
      - RCC_DB_USER=${RCC_DB_USER}
      - RCC_DB_PASSWORD=${RCC_DB_PASSWORD}
      - ts_test_HOST=${ts_test_HOST}
      - ts_test_PORT=${ts_test_PORT}
      - ts_test_DB_NAME=${ts_test_DB_NAME}
      - ts_test_USER=${ts_test_USER}
      - ts_test_PASSWORD=${ts_test_PASSWORD}
      - GF_SERVER_ROOT_URL=https://grafana.tailf9480.ts.net
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Tailscale
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=your-client-id
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=your-client-secret
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://idp.tailf9480.ts.net/authorize/4986734794352390
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=https://idp.tailf9480.ts.net/token
      - GF_AUTH_GENERIC_OAUTH_API_URL=https://idp.tailf9480.ts.net/userinfo
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email offline_access
      - GF_AUTH_GENERIC_OAUTH_CLIENT_AUTH_METHOD=client_secret_post
      - GF_AUTH_GENERIC_OAUTH_USE_PKCE=true
      - GF_AUTH_GENERIC_OAUTH_USE_REFRESH_TOKEN=true
      # Optional: Attribute mapping
      - GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH=preferred_username
      - GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH=name
      - GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH=email
      # Optional: Role mapping
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=role
      - GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN=true


    volumes:
      - grafana_storage:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning
      - ./grafana.ini:/etc/grafana/grafana.ini

volumes:
  grafana_storage: {}